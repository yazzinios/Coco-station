version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: cc_mediamtx
    restart: always
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
    configs:
      - source: mediamtx_config
        target: /mediamtx.yml
    networks:
      cocostation-net:
        ipv4_address: 10.20.0.2

  db:
    image: postgres:16-alpine
    container_name: cc_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coco_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cocostation}
    volumes:
      - cocostation-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coco} -d ${POSTGRES_DB:-cocostation}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      cocostation-net:
        ipv4_address: 10.20.0.3

  api:
    build:
      context: ./api
    container_name: cc_api
    restart: always
    # Port 8000 is NOT exposed publicly — accessed only through nginx (dashboard)
    environment:
      - DB_MODE=${DB_MODE:-local}
      - POSTGRES_USER=${POSTGRES_USER:-coco}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-coco_secret}
      - POSTGRES_DB=${POSTGRES_DB:-cocostation}
      - POSTGRES_HOST=db
      - FFMPEG_HOST=ffmpeg-mixer
    volumes:
      - cocostation-library:/app/data/library
      - cocostation-announcements:/app/data/announcements
      - cocostation-chimes:/app/data/chimes
    depends_on:
      db:
        condition: service_healthy
    networks:
      cocostation-net:
        ipv4_address: 10.20.0.4

  ffmpeg-mixer:
    build:
      context: ./ffmpeg-mixer
    container_name: cc_ffmpeg
    restart: always
    depends_on:
      - mediamtx
      - api
    volumes:
      - cocostation-library:/library
      - cocostation-announcements:/announcements
      - cocostation-chimes:/chimes:ro
    environment:
      - MEDIAMTX_HOST=mediamtx
      - API_HOST=api
      - PYTHONUNBUFFERED=1
    networks:
      cocostation-net:
        ipv4_address: 10.20.0.5

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: "https://radio.cocopark.duckdns.org"
        VITE_WS_URL: "wss://radio.cocopark.duckdns.org"
    container_name: cc_dashboard
    restart: always
    ports:
      - "8083:80"
    depends_on:
      - api
    networks:
      cocostation-net:
        ipv4_address: 10.20.0.6

configs:
  mediamtx_config:
    file: ./mediamtx/mediamtx.yml

networks:
  cocostation-net:
    name: cocostation-net
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24
          gateway: 10.20.0.1

volumes:
  cocostation-db-data:
    name: cocostation-db-data
  cocostation-library:
    name: cocostation-library
  cocostation-announcements:
    name: cocostation-announcements
  cocostation-chimes:
    name: cocostation-chimes
