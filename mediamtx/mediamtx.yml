###############################################
# Global settings
api: yes
apiAddress: :9997

###############################################
# RTSP
rtsp: yes
rtspAddress: :8554

###############################################
# RTMP
rtmp: yes
rtmpAddress: :1935

###############################################
# HLS
hls: yes
hlsAddress: :8888
hlsVariant: mpegts
hlsAlwaysRemux: yes
hlsSegmentDuration: 1s
hlsSegmentCount: 3

###############################################
# WebRTC
webrtc: yes
webrtcAddress: :8889

###############################################
# Paths

paths:
  deck-a:
    source: publisher
    sourceOnDemand: no
  deck-a-opus:
    source: rtsp://localhost:8554/deck-a
    sourceOnDemand: yes
  deck-b:
    source: publisher
    sourceOnDemand: no
  deck-b-opus:
    source: rtsp://localhost:8554/deck-b
    sourceOnDemand: yes
  deck-c:
    source: publisher
    sourceOnDemand: no
  deck-c-opus:
    source: rtsp://localhost:8554/deck-c
    sourceOnDemand: yes
  deck-d:
    source: publisher
    sourceOnDemand: no
  deck-d-opus:
    source: rtsp://localhost:8554/deck-d
    sourceOnDemand: yes
