###############################################
# Global settings
api: yes
apiAddress: :9997

###############################################
# RTSP
rtsp: yes
rtspAddress: :8554

###############################################
# RTMP
rtmp: yes
rtmpAddress: :1935

###############################################
# HLS
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

###############################################
# WebRTC
webrtc: yes
webrtcAddress: :8889

###############################################
# Paths

paths:
  deck-a:
    source: publisher
    sourceOnDemand: no
    runOnInit: >-
      ffmpeg -re -y
      -f lavfi -i anullsrc=r=44100:cl=stereo
      -vn -c:a aac -b:a 128k
      -f flv rtmp://localhost:1935/deck-a
    runOnInitRestart: yes

  deck-a-opus:
    source: rtsp://localhost:8554/deck-a
    sourceOnDemand: yes
    runOnInit: >-
      ffmpeg -re -y
      -i rtsp://localhost:8554/deck-a
      -vn -c:a libopus -b:a 96k -ar 48000 -ac 2
      -f rtsp rtsp://localhost:8554/deck-a-opus
    runOnInitRestart: yes

