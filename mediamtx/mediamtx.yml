###############################################
# Global settings

# API needed to read status, if needed
api: yes
apiAddress: :9997

###############################################
# RTSP settings

rtsp: yes
rtspAddress: :8554

###############################################
# RTMP settings

rtmp: yes
rtmpAddress: :1935

###############################################
# HLS settings

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes

###############################################
# WebRTC settings

webrtc: yes
webrtcAddress: :8889

###############################################
# Path settings

paths:
  # Deck A
  deck-a:
    source: publisher
    sourceOnDemand: no
    runOnInit: >-
      ffmpeg -re -y
      -f lavfi -i anullsrc=r=44100:cl=stereo
      -c:a aac -b:a 128k
      -f flv rtmp://localhost:1935/deck-a
    runOnInitRestart: yes

  # Deck A - WebRTC compatible (Opus)
  deck-a-webrtc:
    source: rtmp://localhost:1935/deck-a
    sourceOnDemand: yes

  # Deck B
  deck-b:
