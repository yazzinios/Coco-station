version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: cc_mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC WHEP (HTTP signalling)
      - "8189:8189/udp" # WebRTC ICE UDP media
    configs:
      - source: mediamtx_config
        target: /mediamtx.yml

  ffmpeg-mixer:
    build: ./ffmpeg-mixer
    container_name: cc_ffmpeg
    restart: unless-stopped
    depends_on:
      mediamtx:
        condition: service_started
    volumes:
      - ./data/library:/library:ro
      - ./data/announcements:/announcements:ro
      - ./data/chimes:/chimes:ro
    environment:
      - TZ=Africa/Casablanca
      - MEDIAMTX_HOST=mediamtx
      - API_HOST=api
      - PYTHONUNBUFFERED=1
    # Command is handled by entrypoint.sh in the Dockerfile

  api:
    build: ./api
    container_name: cc_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/library:/app/data/library
      - ./data/announcements:/app/data/announcements
      - ./data/chimes:/app/data/chimes
      - ./data/branding:/app/data/branding
      - ./api:/app  # For hot-reloading in dev
      - ./supabase/migrations:/app/supabase/migrations:ro
    environment:
      - TZ=Africa/Casablanca
      - DB_MODE=${DB_MODE:-local}
      - POSTGRES_USER=${POSTGRES_USER:-coco}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-coco_secret}
      - POSTGRES_DB=${POSTGRES_DB:-cocostation}
      - POSTGRES_HOST=db
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - FFMPEG_HOST=ffmpeg-mixer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 12          # wait up to 60s for the API to boot
      start_period: 15s    # give it 15s grace before first check
    depends_on:
      db:
        condition: service_healthy
      ffmpeg-mixer:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: cc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coco_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cocostation}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Exposed for debugging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coco} -d ${POSTGRES_DB:-cocostation}"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_WS_URL=ws://localhost:8000
        - VITE_SUPABASE_URL=${SUPABASE_URL:-}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    container_name: cc_dashboard
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      - TZ=Africa/Casablanca
    depends_on:
      api:
        condition: service_healthy

configs:
  mediamtx_config:
    file: ./mediamtx/mediamtx.yml
