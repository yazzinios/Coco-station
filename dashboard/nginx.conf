# Upstream definitions — nginx resolves these at startup and keeps connections alive
upstream api_backend {
    server api:8000;
    keepalive 8;          # maintain up to 8 idle connections to the API
}

upstream mediamtx_hls {
    server mediamtx:8888;
    keepalive 4;
}

upstream mediamtx_webrtc {
    server mediamtx:8889;
    keepalive 4;
}

server {
    listen 80;
    client_max_body_size 0;

    # Keep the nginx<->browser connection alive for 1 hour (covers long WS sessions)
    keepalive_timeout 3600s;

    # ── WebSocket — mic audio stream (more specific, must come before /ws) ──
    location /ws/mic {
        proxy_pass         http://api_backend/ws/mic;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;   # 24 h — mic session can run all day
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket — main state sync ──────────────────────────
    location /ws {
        proxy_pass         http://api_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;   # 24 h — never let nginx drop the WS connection
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ── API REST ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
        proxy_request_buffering off;   # stream large audio uploads directly
        # Retry on upstream errors (e.g. API still booting)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
    }

    # ── WebRTC WHEP — must be before the generic HLS deck regex ──
    location ~ ^/(deck-[a-d])/whep$ {
        proxy_pass         http://mediamtx_webrtc;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }

    # ── HLS streams from MediaMTX ─────────────────────────────
    location ~ ^/(deck-[a-d])/ {
        proxy_pass         http://mediamtx_hls;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    }

    # ── MediaMTX internal API ─────────────────────────────────
    location /mediamtx-api/ {
        proxy_pass         http://mediamtx:9997/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Dashboard SPA — catch-all, must be last ───────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html index.htm;
        try_files  $uri $uri/ /index.html;
    }
}
